<!DOCTYPE html><html><head><meta charset="UTF-8"><title>DCS MIZ v5.1 Fixed Height</title><script src="https://unpkg.com/vue@3/dist/vue.global.js"></script><script src="https://cdn.tailwindcss.com"></script><style>.content{height:calc(100vh - 4rem);overflow-y:auto;position:relative;padding-bottom:500px;}.hl{animation:h 2s;font-weight:700}@keyframes h{0%{background:#bfdbfe}100%{background:0 0}}.tree-bg{font-family:monospace;background:#0f172a;color:#94a3b8;padding:1rem;border-radius:1rem;line-height:1.5;}.sticky-top{position:sticky;top:0;z-index:40;background:rgba(248,250,252,0.95);backdrop-filter:blur(10px);padding-bottom:1rem;margin-bottom:1rem;border-bottom:1px solid #e2e8f0;}.res-img{min-height:200px;max-height:450px;width:100%;object-fit:contain;background:#f1f5f9;border-radius:0.75rem;border:1px solid #e2e8f0;}</style></head>
<body class="bg-slate-100 text-[11px] font-sans"><div id="app" class="flex flex-col h-screen">
<nav class="bg-slate-900 text-white h-16 flex items-center px-4 justify-between z-50 shadow-xl"><div class="flex items-center space-x-2"><h1 class="font-black text-blue-400 text-xl tracking-tighter">DCSLOC</h1><select v-model="selectedMiz" @change="fetchMizData" class="bg-slate-800 p-1 rounded w-48 border-none"><option value="">选择 MIZ...</option><option v-for="f in mizFiles" :value="f">{{f}}</option></select><input v-model="customPath" placeholder="路径..." class="bg-slate-800 p-1 rounded w-32 outline-none"><button @click="loadCustomPath" class="bg-blue-600 px-2 py-1 rounded font-bold">加载</button></div><input type="file" id="up" class="hidden" @change="handleUpload"><label for="up" class="bg-slate-700 px-3 py-1.5 rounded cursor-pointer font-bold uppercase text-[9px]">上传</label></nav>
<div class="flex flex-1 overflow-hidden">
<aside class="w-52 bg-white border-r p-5 overflow-y-auto z-20 shadow-inner"><h2 class="text-slate-400 font-bold uppercase text-[9px] mb-3 italic">1. 语种</h2><div v-if="mizData" v-for="(d,l) in mizData.languages" @click="toggleLang(l)" class="p-2 cursor-pointer hover:bg-blue-50 rounded flex items-center mb-1 transition-all" :class="selectedLangs.includes(l)?'text-blue-700 font-bold bg-blue-50':''"><input type="checkbox" :checked="selectedLangs.includes(l)" class="mr-2">{{l}}</div><h2 class="text-slate-400 font-bold uppercase text-[9px] mt-8 mb-3 italic">2. 分类</h2><div v-if="mizData" @click="selectedCategory='mission'" class="p-2 cursor-pointer rounded mb-1 transition-all" :class="selectedCategory=='mission'?'bg-red-600 text-white shadow-lg':'hover:bg-slate-100'">任务树</div><div v-if="mizData" @click="selectedCategory='dictionary'" class="p-2 cursor-pointer rounded mb-1 transition-all" :class="selectedCategory=='dictionary'?'bg-slate-800 text-white shadow-lg':'hover:bg-slate-100'">文本词典</div><div v-for="ext in availableExtensions" @click="selectedCategory=ext" class="p-2 cursor-pointer rounded uppercase font-mono transition-all" :class="selectedCategory==ext?'bg-slate-800 text-white shadow-lg':'hover:bg-slate-100'">{{ext}}</div></aside>
<main ref="scrollContainer" class="flex-1 content p-8" @scroll="handleScroll"><div v-if="mizData && selectedLangs.length" class="max-w-7xl mx-auto"><div class="sticky-top flex justify-between items-end pt-4"><div><h2 class="text-3xl font-black uppercase text-slate-800 tracking-tighter">{{selectedCategory}}</h2><div v-if="selectedCategory=='mission'" class="mt-2 flex items-center bg-white px-2 py-1 rounded border shadow-sm"><input type="checkbox" v-model="onlyShowResources" id="f"><label for="f" class="ml-2 font-bold text-slate-600">聚焦资源</label></div></div><input v-model="searchQuery" placeholder="搜索..." class="border-2 border-slate-200 p-2.5 w-80 rounded-2xl outline-none focus:border-blue-500 shadow-sm bg-white"></div>
<div v-if="selectedCategory=='mission'" class="tree-bg shadow-2xl min-h-[500px]"><tree-item v-for="(v, k) in displayTree" :key="k" :label="k" :value="v" @jump="jumpTo"></tree-item></div>
<div v-else class="bg-white rounded-3xl shadow-2xl border border-slate-200 overflow-hidden relative"><div class="flex bg-slate-800 text-white text-[9px] font-bold sticky top-0 z-10 border-b border-slate-900"><div class="w-48 p-4">标识 & 用途</div><div v-for="l in selectedLangs" class="flex-1 p-4 border-l border-slate-700">{{l}} 内容</div></div><div :style="{height:totalHeight+'px'}" class="relative"><div :style="{transform:`translateY(${offsetY}px)`}" class="absolute w-full divide-y divide-slate-100">
<div v-for="k in visibleKeys" :key="k" :id="'row-'+k" class="flex hover:bg-blue-50/10 min-h-[140px]" :style="{height: currentRowHeight + 'px'}"><div class="w-48 p-4 border-r bg-slate-50/50 font-mono text-[9px] text-slate-400 break-all"><div class="mb-2 font-bold">{{k}}</div><div v-if="mizData.file_usage?.[k]" class="flex flex-wrap gap-1 mb-2"><div v-for="f in mizData.file_usage[k]" class="bg-blue-50 text-blue-500 border px-1 rounded text-[8px]">{{f}}</div></div><button v-for="lk in getLinks(k)" @click="jumpTo(lk)" class="text-blue-500 underline block text-[8px] mt-1 font-bold">🔗关联</button></div>
<div v-for="l in selectedLangs" class="flex-1 p-4 border-l align-top bg-white overflow-hidden">
<div v-if="selectedCategory=='dictionary'" class="space-y-3"><div v-if="mizData.languages[l]?.dictionary[k]" :class="mizData.languages[l].dictionary[k].is_fallback?'text-slate-200 italic opacity-50':'text-slate-800'" class="whitespace-pre-wrap text-sm">{{mizData.languages[l].dictionary[k].val}}</div><div v-for="rk in getLinks(k)" class="bg-blue-50/50 p-2 rounded-xl border border-blue-100 shadow-inner"><div class="font-black text-blue-400 text-[8px] mb-1 uppercase">音频: {{rk}}</div><audio v-if="isAudio(mizData.languages[l]?.resources[rk]?.val)" controls preload="none" class="w-full h-7 opacity-80"><source :src="getUrl(l,mizData.languages[l].resources[rk].val)"></audio><img v-else-if="isImage(mizData.languages[l]?.resources[rk]?.val)" :src="getUrl(l,mizData.languages[l].resources[rk].val)" loading="lazy" class="res-img mt-1 shadow-md"></div></div>
<div v-else class="space-y-3"><div v-if="mizData.languages[l]?.resources[k] && (!mizData.languages[l].resources[k].is_fallback||l=='DEFAULT')"><div class="font-bold text-blue-600 truncate bg-blue-50 px-2 py-0.5 rounded-full inline-block">{{mizData.languages[l].resources[k].val}}</div><div v-if="getLinkedText(k,l)" class="bg-slate-50 p-3 rounded-2xl italic text-slate-500 border text-[10px] leading-normal shadow-inner max-h-[100px] overflow-hidden">"{{getLinkedText(k,l)}}"</div><audio v-if="isAudio(mizData.languages[l].resources[k].val)" controls preload="none" class="w-full h-7"><source :src="getUrl(l,mizData.languages[l].resources[k].val)"></audio><img v-else-if="isImage(mizData.languages[l].resources[k].val)" :src="getUrl(l,mizData.languages[l].resources[k].val)" loading="lazy" class="res-img shadow-lg"></div><div v-else class="text-slate-100 italic uppercase py-4">-- fallback --</div></div>
</div></div></div></div></div></div></main></div></div>
<script>
const {createApp,ref,computed,onMounted,nextTick}=Vue
const TreeItem={name:'TreeItem',props:['label','value'],template:`<div class="ml-4 border-l border-slate-800 pl-3"><div @click="isOpen=!isOpen" class="cursor-pointer hover:bg-slate-800/50 p-1 flex items-center transition-all"><span v-if="isObj" class="mr-2 text-[8px]">{{isOpen?'▼':'▶'}}</span><span class="text-blue-400 font-bold mr-2">{{label}}:</span><span v-if="!isObj" class="text-green-400 font-mono"><span v-if="isK(value)" class="text-blue-300 underline font-bold" @click.stop="$emit('jump',value)">{{value}}</span><span v-else>{{value}}</span></span></div><div v-if="isObj&&isOpen" class="mt-1"><tree-item v-for="(v,k) in value" :key="k" :label="k" :value="v" @jump="$emit('jump',$event)"></tree-item></div></div>`,data(){return{isOpen:true}},computed:{isObj(){return typeof this.value==='object'&&this.value!==null}},methods:{isK(v){return typeof v==='string'&&(v.includes('DictKey')||v.includes('ResKey'))}}}
createApp({components:{TreeItem},setup(){
    const mizFiles=ref([]),selectedMiz=ref(""),customPath=ref(""),mizData=ref(null),selectedLangs=ref([]),searchQuery=ref(""),selectedCategory=ref("dictionary"),scrollTop=ref(0),onlyShowResources=ref(true)
    const currentRowHeight=computed(()=>['png','jpg','jpeg','bmp'].includes(selectedCategory.value)?550:140)
    const fetchMizFiles=async()=>{mizFiles.value=await(await fetch('/api/miz_files')).json()}
    const loadMizData=async(p)=>{const r=await fetch(`/api/miz_data?file_path=${encodeURIComponent(p)}`);if(!r.ok)return;mizData.value=await r.json();const ls=Object.keys(mizData.value.languages);selectedLangs.value=ls.includes("DEFAULT")?["DEFAULT",ls.find(l=>l!="DEFAULT")].filter(Boolean):[ls[0]]}
    const handleUpload=async(e)=>{const fd=new FormData();fd.append('file',e.target.files[0]);const info=await(await fetch('/api/upload',{method:'POST',body:fd})).json();await fetchMizFiles();selectedMiz.value=info.path;await loadMizData(info.path)}
    const toggleLang=(l)=>selectedLangs.value.includes(l)?selectedLangs.value=selectedLangs.value.filter(x=>x!=l):selectedLangs.value.push(l)
    const availableExtensions=computed(()=>{if(!mizData.value)return[];const s=new Set();Object.values(mizData.value.languages).forEach(l=>Object.values(l.resources).forEach(r=>{const m=r.val.match(/\.([a-z0-9]+)$/i);if(m)s.add(m[1].toLowerCase())}));return Array.from(s).sort()})
    const filteredKeys=computed(()=>{if(!mizData.value||!selectedLangs.value.length||selectedCategory.value=='mission')return[];const isD=selectedCategory.value=='dictionary',ks=new Set(),q=searchQuery.value.toLowerCase();selectedLangs.value.forEach(l=>{const src=mizData.value.languages[l]?.[isD?'dictionary':'resources'];if(!src)return;Object.entries(src).forEach(([k,it])=>{if(!isD&&!it.val.toLowerCase().endsWith('.'+selectedCategory.value))return;if(!q||k.toLowerCase().includes(q)||it.val.toLowerCase().includes(q))ks.add(k)})});return Array.from(ks).sort()})
    const filterTree=(n)=>{if(typeof n==='string')return(n.includes('DictKey')||n.includes('ResKey'))?n:null;if(typeof n==='object'&&n!==null){const f={};let found=false;for(const[k,v]of Object.entries(n)){const r=filterTree(v);if(r!==null){f[k]=r;found=true}}return found?f:null}return null}
    const jumpTo=async(tk)=>{searchQuery.value=tk;if(tk.includes('ResKey')){const ex=availableExtensions.value.find(e=>selectedLangs.value.some(l=>mizData.value.languages[l]?.resources[tk]?.val.toLowerCase().endsWith('.'+e)));selectedCategory.value=ex||availableExtensions.value[0]}else{selectedCategory.value='dictionary'}
    await nextTick();const el=document.getElementById('row-'+tk);if(el){el.scrollIntoView({behavior:'smooth',block:'center'});el.classList.add('hl');setTimeout(()=>el.classList.remove('hl'),2000)}}
    const getUrl=(l,n)=>`/api/resource?file_path=${encodeURIComponent(mizData.value.path)}&lang=${l}&res_name=${encodeURIComponent(n)}`
    const isAudio=(n)=>n&&(n.toLowerCase().endsWith('.ogg')||n.toLowerCase().endsWith('.wav'))
    const isImage=(n)=>n&&(n.toLowerCase().endsWith('.png')||n.toLowerCase().endsWith('.jpg')||n.toLowerCase().endsWith('.jpeg')||n.toLowerCase().endsWith('.bmp'))
    onMounted(fetchMizFiles);return {mizFiles,selectedMiz,customPath,mizData,selectedLangs,searchQuery,selectedCategory,availableExtensions,fetchMizData:()=>loadMizData(selectedMiz.value),loadCustomPath:()=>loadMizData(customPath.value),handleUpload,toggleLang,filteredKeys,getLinks:(k)=>k.startsWith('DictKey')?(mizData.value?.links[k]||[]):Object.keys(mizData.value?.links||{}).filter(dk=>mizData.value.links[dk].includes(k)),getLinkedText:(rk,l)=>{const dk=Object.keys(mizData.value?.links||{}).find(dk=>mizData.value.links[dk].includes(rk));return dk?mizData.value.languages[l]?.dictionary[dk]?.val:""},jumpTo,getUrl,isAudio,isImage,handleScroll:(e)=>{scrollTop.value=e.target.scrollTop},totalHeight:computed(()=>filteredKeys.value.length*currentRowHeight.value),visibleKeys:computed(()=>filteredKeys.value.slice(Math.floor(scrollTop.value/currentRowHeight.value),Math.floor(scrollTop.value/currentRowHeight.value)+10)),offsetY:computed(()=>Math.floor(scrollTop.value/currentRowHeight.value)*currentRowHeight.value),onlyShowResources,displayTree:computed(()=>(mizData.value&&mizData.value.mission_tree)?(onlyShowResources.value?filterTree(mizData.value.mission_tree)||{}:mizData.value.mission_tree):{}),currentRowHeight}
}}).mount('#app')
</script></body></html>
